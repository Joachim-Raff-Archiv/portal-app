name: Build and Push (Public)

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Install Ant and gh CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y ant gh curl

      - name: Build data package (public)
        run: |
          ant -verbose -lib scripts/libs dist
          echo "Build finished, listing dist:"
          ls -la dist || true

      - name: Find artifact
        id: find
        run: |
          ART=$(ls dist/raffArchive-*.xar 2>/dev/null | head -n1 || true)
          if [ -z "$ART" ]; then echo "No artifact found in dist" && exit 1; fi
          echo "artifact=$ART" >> $GITHUB_OUTPUT

      - name: Create versioned release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep '^project.version=' build.properties | cut -d'=' -f2)
          gh release create prod-latest \
            --title "v$VERSION" \
            --notes "Automatic build and release from main branch." \
            --target main \
            ${{ steps.find.outputs.artifact }}

  dispatch:
    runs-on: ubuntu-latest
    needs: build-and-publish
    steps:
      - name: Trigger jraDocker (Public) build and redeploy
        env:
          PAT: ${{ secrets.JRA_ACCESS_PAT }}
        run: |
          curl -X POST \
            -H "Authorization: token $PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/Joachim-Raff-Archiv/jraDocker/dispatches \
            -d '{"event_type":"portal_app_latest","client_payload":{"ref":"'$GITHUB_REF'","commit":"'$GITHUB_SHA'"}}'