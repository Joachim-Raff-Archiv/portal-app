name: Build and Push (Dev)

on:
  push:
    branches: [ "develop" ]

permissions:
  contents: write
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Install Ant and gh CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y ant gh curl

      - name: Build data package (public)
        run: |
          ant -verbose -lib scripts/libs -Dproject.status=development dist
          echo "Build finished, listing dist:"
          ls -la dist || true

      - name: Find artifact
        id: find
        run: |
          ART=$(ls dist/raffArchive-*.xar 2>/dev/null | head -n1 || true)
          if [ -z "$ART" ]; then echo "No artifact found in dist" && exit 1; fi
          echo "artifact=$ART" >> $GITHUB_OUTPUT
          echo "artifact_name=$(basename $ART)" >> $GITHUB_OUTPUT

      - name: 'Upload Artifact'
        uses: actions/upload-artifact@v4
        with:
          name: portal-app-dev
          path: dist/raffArchive-*.xar
          retention-days: 90

      - name: Delete existing dev-latest release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete dev-latest --yes || echo "Release dev-latest does not exist yet"
          git push origin :refs/tags/dev-latest || echo "Tag dev-latest does not exist yet"

      - name: Create or update dev-latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create dev-latest \
            --title "raffArchive Portal-App (dev)" \
            --notes "Automatischer Build vom develop Branch. Dies ist ein Pre-Release für Entwicklungszwecke." \
            --prerelease \
            --target develop \
            ${{ steps.find.outputs.artifact }}

  dispatch:
    runs-on: ubuntu-latest
    needs: build-and-publish
    steps:
      - name: Trigger Docker build
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.JRA_ACCESS_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Joachim-Raff-Archiv/jraDocker/dispatches \
            -d '{"event_type":"portal_app_dev_latest"}'